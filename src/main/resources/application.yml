spring:
  application:
    name: ai-chatbot-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ai_chatbot}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:${USER}}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: 8080

app:
  jwt:
    issuer: "ai-chatbot-service"
    secret: "change-this-in-prod-change-this-in-prod"
    expiration-minutes: 120
  chat:
    thread-expire-minutes: 30
    default-model: "gpt-4o-mini"

logging:
  level:
    org.hibernate.SQL: warn
